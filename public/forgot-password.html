<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Shri Govind Pharmacy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="/js/theme.js"></script>
    <style>
        :root {
            --primary: #1c8125;
            --primary-dark: #145a1a;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-muted: #6c757d;
            --border: #e9ecef;
            --success: #28a745;
        }
        [data-theme="dark"] {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #2d2d2d;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forgot-container {
            max-width: 500px;
            width: 90%;
            background: var(--surface);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .logo-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .otp-input {
            width: 50px;
            height: 60px;
            border: 2px solid var(--border);
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
        }
        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link a:hover {
            color: var(--primary);
        }
        .hidden {
            display: none;
        }
        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }
        .strength-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0;
            transition: all 0.3s;
            background: #dc3545;
        }
        .resend-btn {
            text-align: center;
            margin-top: 15px;
        }
        .resend-btn button {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .resend-btn button:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .email-display {
            background: var(--bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .email-display i {
            color: var(--primary);
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <div class="logo-title">Shri Govind Pharmacy</div>
        </div>

        <h1>Forgot Password</h1>
        <p class="subtitle">Reset your password securely</p>

        <div id="message" class="message"></div>

        <!-- Step 1: Enter Email -->
        <div id="step1">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Enter Your Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
            </div>
            <button class="btn-primary" onclick="sendOTP()">
                <i class="fas fa-paper-plane"></i> Send OTP
            </button>
        </div>

        <!-- Step 2: Enter OTP and New Password -->
        <div id="step2" class="hidden">
            <div class="email-display">
                <i class="fas fa-envelope"></i>
                <strong id="email-display"></strong>
            </div>

            <div class="form-group">
                <label><i class="fas fa-key"></i> Enter 6-Digit OTP</label>
                <div class="otp-inputs">
                    <input type="text" class="otp-input" maxlength="1" data-index="0">
                    <input type="text" class="otp-input" maxlength="1" data-index="1">
                    <input type="text" class="otp-input" maxlength="1" data-index="2">
                    <input type="text" class="otp-input" maxlength="1" data-index="3">
                    <input type="text" class="otp-input" maxlength="1" data-index="4">
                    <input type="text" class="otp-input" maxlength="1" data-index="5">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> New Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="new-password" placeholder="Enter new password" required>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthBar"></div>
                    </div>
                    <span id="strengthText" style="color: var(--text-muted); font-size: 12px;"></span>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirm-password" placeholder="Confirm new password" required>
                </div>
            </div>

            <button class="btn-primary" onclick="resetPassword()">
                <i class="fas fa-save"></i> Reset Password
            </button>

            <div class="resend-btn">
                <button onclick="resendOTP()" id="resendBtn">
                    <i class="fas fa-redo"></i> Resend OTP
                </button>
            </div>
        </div>

        <div class="back-link">
            <a href="/login"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <script>
        let userEmail = '';

        // OTP input handling
        document.querySelectorAll('.otp-input').forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value;
                if (!/^\d*$/.test(value)) {
                    e.target.value = '';
                    return;
                }
                if (value && index < 5) {
                    document.querySelectorAll('.otp-input')[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    document.querySelectorAll('.otp-input')[index - 1].focus();
                }
            });
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').slice(0, 6);
                if (/^\d{6}$/.test(pasteData)) {
                    pasteData.split('').forEach((char, i) => {
                        if (document.querySelectorAll('.otp-input')[i]) {
                            document.querySelectorAll('.otp-input')[i].value = char;
                        }
                    });
                    document.querySelectorAll('.otp-input')[5].focus();
                }
            });
        });

        // Password strength checker
        const passwordInput = document.getElementById('new-password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        if (passwordInput) {
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                let strength = 0;

                if (password.length >= 8) strength++;
                if (/[a-z]/.test(password)) strength++;
                if (/[A-Z]/.test(password)) strength++;
                if (/[0-9]/.test(password)) strength++;

                const colors = ['#dc3545', '#dc3545', '#ffc107', '#28a745', '#28a745'];
                const widths = ['0%', '25%', '50%', '75%', '100%'];
                const texts = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];

                strengthBar.style.width = widths[strength];
                strengthBar.style.background = colors[strength];
                strengthText.textContent = texts[strength];
                strengthText.style.color = colors[strength];
            });
        }

        function showMessage(message, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
        }

        async function sendOTP() {
            const email = document.getElementById('email').value.trim();
            
            if (!email || !/\S+@\S+\.\S+/.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            userEmail = email;
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await response.json();

                if (result.success) {
                    document.getElementById('email-display').textContent = email;
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    showMessage('OTP sent successfully! Check your email.', 'success');
                } else {
                    showMessage(result.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send OTP';
            }
        }

        async function resetPassword() {
            // Get OTP
            let otp = '';
            document.querySelectorAll('.otp-input').forEach(input => otp += input.value);

            if (otp.length !== 6) {
                showMessage('Please enter complete 6-digit OTP', 'error');
                return;
            }

            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!password || password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

            try {
                // First verify OTP
                const verifyResponse = await fetch('/api/otp/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: userEmail,
                        otp: otp,
                        purpose: 'password_reset'
                    })
                });
                const verifyResult = await verifyResponse.json();

                if (!verifyResult.success) {
                    showMessage(verifyResult.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-save"></i> Reset Password';
                    return;
                }

                // Then reset password
                const resetResponse = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: userEmail,
                        password: password,
                        confirm_password: confirmPassword
                    })
                });
                const resetResult = await resetResponse.json();

                if (resetResult.success) {
                    showMessage('✅ Password reset successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showMessage(resetResult.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-save"></i> Reset Password';
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Reset Password';
            }
        }

        async function resendOTP() {
            const btn = document.getElementById('resendBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const response = await fetch('/api/otp/resend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, purpose: 'password_reset' })
                });
                const result = await response.json();

                if (result.success) {
                    showMessage('✅ OTP resent successfully! Check your email.', 'success');
                } else {
                    showMessage(result.message, 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            }
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-redo"></i> Resend OTP';
        }
    </script>
</body>
</html>
