<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <linearGradient id="pharm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:currentColor;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:currentColor;stop-opacity:0.3"/>
    </linearGradient>
    
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.35"/>
    </filter>
    
    <pattern id="pharmacy-3d-pattern" x="0" y="0" width="260" height="260" patternUnits="userSpaceOnUse">
      <!-- 3D Medical Cross -->
      <g transform="translate(40, 40)" filter="url(#shadow3)">
        <rect x="18" y="0" width="24" height="60" rx="4" fill="none" stroke="url(#pharm-grad)" stroke-width="3"/>
        <rect x="0" y="18" width="60" height="24" rx="4" fill="none" stroke="url(#pharm-grad)" stroke-width="3"/>
        <circle cx="30" cy="30" r="6" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
      </g>
      
      <!-- 3D Pill Capsules -->
      <g transform="translate(120, 30) rotate(45)" filter="url(#shadow3)">
        <rect x="0" y="0" width="20" height="40" rx="10" fill="none" stroke="url(#pharm-grad)" stroke-width="3"/>
        <line x1="0" y1="20" x2="20" y2="20" stroke="currentColor" stroke-width="3" opacity="0.7"/>
        <circle cx="10" cy="10" r="3" fill="currentColor" opacity="0.5"/>
        <circle cx="10" cy="30" r="3" fill="currentColor" opacity="0.5"/>
      </g>
      
      <g transform="translate(200, 70) rotate(-30)" filter="url(#shadow3)">
        <rect x="0" y="0" width="18" height="36" rx="9" fill="none" stroke="url(#pharm-grad)" stroke-width="2.5"/>
        <line x1="0" y1="18" x2="18" y2="18" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
      </g>
      
      <!-- Heartbeat / ECG Line 3D -->
      <path d="M 20 120 L 40 120 L 50 100 L 65 145 L 80 105 L 90 120 L 110 120" 
            fill="none" stroke="url(#pharm-grad)" stroke-width="3" filter="url(#shadow3)"/>
      <circle cx="65" cy="145" r="5" fill="currentColor" opacity="0.8" filter="url(#glow3)"/>
      <circle cx="50" cy="100" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
      <circle cx="80" cy="105" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
      
      <!-- 3D Stethoscope -->
      <g transform="translate(180, 130)" filter="url(#shadow3)">
        <circle cx="0" cy="0" r="25" fill="none" stroke="url(#pharm-grad)" stroke-width="3"/>
        <circle cx="0" cy="0" r="10" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
        <circle cx="0" cy="0" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <path d="M 0 -25 L 0 -40" fill="none" stroke="currentColor" stroke-width="3" opacity="0.7"/>
        <circle cx="0" cy="-40" r="5" fill="currentColor" opacity="0.6" filter="url(#glow3)"/>
      </g>
      
      <!-- 3D DNA Mini Helix -->
      <g transform="translate(40, 170)" filter="url(#shadow3)">
        <path d="M 15 0 Q 35 20, 15 40 Q -5 60, 15 80" fill="none" stroke="url(#pharm-grad)" stroke-width="2.5"/>
        <path d="M 45 0 Q 25 20, 45 40 Q 65 60, 45 80" fill="none" stroke="url(#pharm-grad)" stroke-width="2.5"/>
        <line x1="18" y1="15" x2="42" y2="15" stroke="currentColor" stroke-width="2" opacity="0.5"/>
        <line x1="15" y1="40" x2="45" y2="40" stroke="currentColor" stroke-width="2" opacity="0.5"/>
        <line x1="18" y1="65" x2="42" y2="65" stroke="currentColor" stroke-width="2" opacity="0.5"/>
        <circle cx="18" cy="15" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <circle cx="42" cy="15" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <circle cx="15" cy="40" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <circle cx="45" cy="40" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <circle cx="18" cy="65" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <circle cx="42" cy="65" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
      </g>
      
      <!-- 3D Medicine Bottle -->
      <g transform="translate(120, 170)" filter="url(#shadow3)">
        <rect x="8" y="15" width="24" height="45" rx="5" fill="none" stroke="url(#pharm-grad)" stroke-width="3"/>
        <rect x="13" y="0" width="14" height="15" rx="3" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
        <line x1="13" y1="25" x2="27" y2="25" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        <line x1="13" y1="32" x2="27" y2="32" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        <line x1="13" y1="39" x2="23" y2="39" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        <circle cx="20" cy="7" r="3" fill="currentColor" opacity="0.6" filter="url(#glow3)"/>
      </g>
      
      <!-- 3D Molecular Hexagon -->
      <g transform="translate(210, 200)" filter="url(#shadow3)">
        <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" 
                 fill="none" stroke="url(#pharm-grad)" stroke-width="2.5"/>
        <circle cx="0" cy="-20" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <circle cx="17" cy="-10" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <circle cx="17" cy="10" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <circle cx="0" cy="20" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <circle cx="-17" cy="10" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
        <circle cx="-17" cy="-10" r="4" fill="currentColor" opacity="0.7" filter="url(#glow3)"/>
      </g>
      
      <!-- Floating Plus Symbols -->
      <g transform="translate(90, 150)" filter="url(#glow3)">
        <path d="M 0 8 L 16 8 M 8 0 L 8 16" stroke="currentColor" stroke-width="2.5" opacity="0.5"/>
      </g>
      <g transform="translate(150, 110)" filter="url(#glow3)">
        <path d="M 0 6 L 12 6 M 6 0 L 6 12" stroke="currentColor" stroke-width="2" opacity="0.4"/>
      </g>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#pharmacy-3d-pattern)"/>
</svg>
