<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <!-- Gradient for 3D effect -->
    <linearGradient id="dna-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:currentColor;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:currentColor;stop-opacity:0.3"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <pattern id="dna-3d-pattern" x="0" y="0" width="250" height="300" patternUnits="userSpaceOnUse">
      <!-- 3D DNA Double Helix - Strand 1 -->
      <path d="M 40 0 C 80 30, 80 70, 40 100 C 0 130, 0 170, 40 200 C 80 230, 80 270, 40 300" 
            fill="none" stroke="url(#dna-grad1)" stroke-width="3" filter="url(#shadow)"/>
      
      <!-- 3D DNA Double Helix - Strand 2 -->
      <path d="M 120 0 C 80 30, 80 70, 120 100 C 160 130, 160 170, 120 200 C 80 230, 80 270, 120 300" 
            fill="none" stroke="url(#dna-grad1)" stroke-width="3" filter="url(#shadow)"/>
      
      <!-- DNA Rungs with 3D effect -->
      <line x1="45" y1="25" x2="115" y2="25" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      <line x1="55" y1="50" x2="105" y2="50" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      <line x1="45" y1="75" x2="115" y2="75" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      <line x1="40" y1="100" x2="120" y2="100" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      <line x1="45" y1="125" x2="115" y2="125" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      <line x1="55" y1="150" x2="105" y2="150" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      <line x1="45" y1="175" x2="115" y2="175" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      <line x1="40" y1="200" x2="120" y2="200" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      <line x1="45" y1="225" x2="115" y2="225" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      <line x1="55" y1="250" x2="105" y2="250" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      <line x1="45" y1="275" x2="115" y2="275" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow)"/>
      
      <!-- Nucleotide bases with 3D spheres -->
      <circle cx="45" cy="25" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="115" cy="25" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="55" cy="50" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="105" cy="50" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="45" cy="75" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="115" cy="75" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="40" cy="100" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="120" cy="100" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="45" cy="125" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="115" cy="125" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="55" cy="150" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="105" cy="150" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="45" cy="175" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="115" cy="175" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="40" cy="200" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="120" cy="200" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="45" cy="225" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="115" cy="225" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="55" cy="250" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="105" cy="250" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="45" cy="275" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      <circle cx="115" cy="275" r="6" fill="currentColor" opacity="0.8" filter="url(#glow)"/>
      
      <!-- Chemical bond structure -->
      <g transform="translate(170, 40)" filter="url(#shadow)">
        <path d="M 0 0 L 20 -15 L 40 0 L 40 25 L 20 40 L 0 25 Z" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
        <circle cx="0" cy="0" r="4" fill="currentColor" opacity="0.7" filter="url(#glow)"/>
        <circle cx="20" cy="-15" r="4" fill="currentColor" opacity="0.7" filter="url(#glow)"/>
        <circle cx="40" cy="0" r="4" fill="currentColor" opacity="0.7" filter="url(#glow)"/>
        <circle cx="40" cy="25" r="4" fill="currentColor" opacity="0.7" filter="url(#glow)"/>
        <circle cx="20" cy="40" r="4" fill="currentColor" opacity="0.7" filter="url(#glow)"/>
        <circle cx="0" cy="25" r="4" fill="currentColor" opacity="0.7" filter="url(#glow)"/>
      </g>
      
      <!-- Pill capsule 3D -->
      <g transform="translate(180, 150) rotate(-25)" filter="url(#shadow)">
        <rect x="0" y="0" width="18" height="36" rx="9" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
        <line x1="0" y1="18" x2="18" y2="18" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
        <circle cx="9" cy="9" r="2" fill="currentColor" opacity="0.5"/>
        <circle cx="9" cy="27" r="2" fill="currentColor" opacity="0.5"/>
      </g>
      
      <!-- Floating molecules -->
      <g transform="translate(175, 240)" filter="url(#glow)">
        <circle cx="0" cy="0" r="8" fill="currentColor" opacity="0.5"/>
        <circle cx="25" cy="-10" r="6" fill="currentColor" opacity="0.4"/>
        <circle cx="30" cy="15" r="7" fill="currentColor" opacity="0.4"/>
        <line x1="0" y1="0" x2="25" y2="-10" stroke="currentColor" stroke-width="2" opacity="0.5"/>
        <line x1="0" y1="0" x2="30" y2="15" stroke="currentColor" stroke-width="2" opacity="0.5"/>
      </g>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#dna-3d-pattern)"/>
</svg>
