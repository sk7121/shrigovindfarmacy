<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <pattern id="wellness-pattern" x="0" y="0" width="230" height="230" patternUnits="userSpaceOnUse">
      <!-- Ayurvedic Leaf -->
      <g transform="translate(40, 40)" opacity="0.6">
        <path d="M 0 0 Q 15 -20, 30 0 Q 15 10, 0 0" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M 0 0 L 30 0" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M 8 -5 L 8 5" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>
        <path d="M 15 -8 L 15 6" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>
        <path d="M 22 -5 L 22 5" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>
      </g>
      
      <!-- Mortar and Pestle -->
      <g transform="translate(140, 30)" opacity="0.5">
        <path d="M 10 20 Q 10 35, 25 35 Q 40 35, 40 20" fill="none" stroke="currentColor" stroke-width="2"/>
        <line x1="5" y1="20" x2="45" y2="20" stroke="currentColor" stroke-width="2"/>
        <line x1="30" y1="5" x2="20" y2="25" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="30" cy="5" r="3" fill="currentColor" opacity="0.6"/>
      </g>
      
      <!-- Herbal Drops -->
      <g transform="translate(80, 90)" opacity="0.5">
        <path d="M 10 0 Q 15 15, 10 25 Q 5 15, 10 0" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="10" cy="25" r="2" fill="currentColor" opacity="0.6"/>
      </g>
      
      <g transform="translate(100, 95)" opacity="0.5">
        <path d="M 8 0 Q 12 12, 8 20 Q 4 12, 8 0" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="8" cy="20" r="2" fill="currentColor" opacity="0.6"/>
      </g>
      
      <!-- DNA Helix -->
      <g transform="translate(30, 120)" opacity="0.6">
        <path d="M 10 0 Q 25 15, 10 30 Q -5 45, 10 60" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M 40 0 Q 25 15, 40 30 Q 55 45, 40 60" fill="none" stroke="currentColor" stroke-width="2"/>
        <line x1="13" y1="10" x2="37" y2="10" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        <line x1="10" y1="30" x2="40" y2="30" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        <line x1="13" y1="50" x2="37" y2="50" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        <circle cx="13" cy="10" r="3" fill="currentColor" opacity="0.7"/>
        <circle cx="37" cy="10" r="3" fill="currentColor" opacity="0.7"/>
        <circle cx="10" cy="30" r="3" fill="currentColor" opacity="0.7"/>
        <circle cx="40" cy="30" r="3" fill="currentColor" opacity="0.7"/>
        <circle cx="13" cy="50" r="3" fill="currentColor" opacity="0.7"/>
        <circle cx="37" cy="50" r="3" fill="currentColor" opacity="0.7"/>
      </g>
      
      <!-- Lotus Flower (Ayurvedic symbol) -->
      <g transform="translate(160, 140)" opacity="0.5">
        <ellipse cx="0" cy="-10" rx="6" ry="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <ellipse cx="-10" cy="-5" rx="6" ry="12" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(-30 -10 -5)"/>
        <ellipse cx="10" cy="-5" rx="6" ry="12" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(30 10 -5)"/>
        <ellipse cx="-12" cy="5" rx="6" ry="12" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(-60 -12 5)"/>
        <ellipse cx="12" cy="5" rx="6" ry="12" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(60 12 5)"/>
        <circle cx="0" cy="0" r="4" fill="currentColor" opacity="0.6"/>
      </g>
      
      <!-- Wellness Nodes -->
      <circle cx="50" cy="200" r="5" fill="currentColor" opacity="0.5"/>
      <circle cx="80" cy="195" r="5" fill="currentColor" opacity="0.5"/>
      <circle cx="110" cy="200" r="5" fill="currentColor" opacity="0.5"/>
      <circle cx="140" cy="195" r="5" fill="currentColor" opacity="0.5"/>
      <circle cx="170" cy="200" r="5" fill="currentColor" opacity="0.5"/>
      <circle cx="200" cy="195" r="5" fill="currentColor" opacity="0.5"/>
      
      <!-- Connection lines -->
      <path d="M 50 200 L 80 195 L 110 200 L 140 195 L 170 200 L 200 195" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      
      <!-- Herbal Molecule -->
      <g transform="translate(120, 170)" opacity="0.5">
        <path d="M 0 0 L 20 -10 L 40 0 L 40 20 L 20 30 L 0 20 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="3" fill="currentColor" opacity="0.6"/>
        <circle cx="20" cy="-10" r="3" fill="currentColor" opacity="0.6"/>
        <circle cx="40" cy="0" r="3" fill="currentColor" opacity="0.6"/>
        <circle cx="40" cy="20" r="3" fill="currentColor" opacity="0.6"/>
        <circle cx="20" cy="30" r="3" fill="currentColor" opacity="0.6"/>
        <circle cx="0" cy="20" r="3" fill="currentColor" opacity="0.6"/>
      </g>
      
      <!-- Small decorative elements -->
      <path d="M 15 100 L 25 100 M 20 95 L 20 105" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <path d="M 190 80 L 200 80 M 195 75 L 195 85" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#wellness-pattern)"/>
</svg>
