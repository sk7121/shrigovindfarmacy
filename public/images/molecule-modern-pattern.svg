<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <pattern id="modern-molecule" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Modern hexagon -->
      <polygon points="30,10 45,20 45,40 30,50 15,40 15,20" 
               fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
      
      <!-- Connection lines -->
      <line x1="45" y1="20" x2="70" y2="10" stroke="currentColor" stroke-width="1" opacity="0.25"/>
      <line x1="45" y1="40" x2="70" y2="50" stroke="currentColor" stroke-width="1" opacity="0.25"/>
      
      <!-- Second hexagon -->
      <polygon points="70,10 85,20 85,40 70,50 55,40 55,20" 
               fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
      
      <!-- Nodes -->
      <circle cx="30" cy="10" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="45" cy="20" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="45" cy="40" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="30" cy="50" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="15" cy="40" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="15" cy="20" r="2" fill="currentColor" opacity="0.5"/>
      
      <circle cx="70" cy="10" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="85" cy="20" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="85" cy="40" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="70" cy="50" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="55" cy="40" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="55" cy="20" r="2" fill="currentColor" opacity="0.5"/>
      
      <!-- Minimalist dots -->
      <circle cx="10" cy="70" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="25" cy="70" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="40" cy="70" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="55" cy="70" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="70" cy="70" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="85" cy="70" r="1.5" fill="currentColor" opacity="0.3"/>
      
      <circle cx="10" cy="85" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="25" cy="85" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="40" cy="85" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="55" cy="85" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="70" cy="85" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="85" cy="85" r="1.5" fill="currentColor" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#modern-molecule)"/>
</svg>
