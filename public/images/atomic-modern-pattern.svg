<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <pattern id="modern-atomic" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Modern atom - minimalist circles -->
      <circle cx="30" cy="30" r="18" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      <circle cx="30" cy="30" r="12" fill="none" stroke="currentColor" stroke-width="1" opacity="0.25"/>
      <circle cx="30" cy="30" r="4" fill="currentColor" opacity="0.4"/>
      
      <!-- Electron dots -->
      <circle cx="48" cy="30" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="12" cy="30" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="30" cy="48" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="30" cy="12" r="2" fill="currentColor" opacity="0.5"/>
      
      <!-- Second atom -->
      <circle cx="75" cy="70" r="15" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      <circle cx="75" cy="70" r="10" fill="none" stroke="currentColor" stroke-width="1" opacity="0.25"/>
      <circle cx="75" cy="70" r="3" fill="currentColor" opacity="0.4"/>
      
      <!-- Connection line -->
      <line x1="30" y1="30" x2="75" y2="70" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      
      <!-- Modern grid dots -->
      <circle cx="85" cy="15" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="95" cy="15" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="85" cy="25" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="95" cy="25" r="1.5" fill="currentColor" opacity="0.3"/>
      
      <circle cx="10" cy="75" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="20" cy="75" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="10" cy="85" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="20" cy="85" r="1.5" fill="currentColor" opacity="0.3"/>
      
      <!-- Subtle hexagon -->
      <polygon points="50,5 58,10 58,20 50,25 42,20 42,10" 
               fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#modern-atomic)"/>
</svg>
