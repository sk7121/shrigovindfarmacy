<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <pattern id="modern-pharmacy" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- Modern medical cross - minimalist -->
      <path d="M 15 5 L 25 5 L 25 15 L 35 15 L 35 25 L 25 25 L 25 35 L 15 35 L 15 25 L 5 25 L 5 15 L 15 15 Z" 
            fill="currentColor" opacity="0.25"/>
      
      <!-- Abstract pill shape -->
      <rect x="50" y="8" width="10" height="20" rx="5" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3" transform="rotate(45 55 18)"/>
      
      <!-- Heartbeat line - minimalist -->
      <path d="M 5 55 L 15 55 L 20 48 L 28 62 L 35 50 L 40 55 L 55 55" 
            fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      
      <!-- Modern dots -->
      <circle cx="50" cy="50" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="60" cy="50" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="70" cy="50" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="50" cy="60" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="60" cy="60" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="70" cy="60" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="50" cy="70" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="60" cy="70" r="2" fill="currentColor" opacity="0.4"/>
      <circle cx="70" cy="70" r="2" fill="currentColor" opacity="0.4"/>
      
      <!-- Subtle lines -->
      <line x1="40" y1="10" x2="40" y2="30" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      <line x1="50" y1="10" x2="50" y2="30" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      <line x1="60" y1="10" x2="60" y2="30" stroke="currentColor" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#modern-pharmacy)"/>
</svg>
