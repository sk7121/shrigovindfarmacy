<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <linearGradient id="atom-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:currentColor;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:currentColor;stop-opacity:0.3"/>
    </linearGradient>
    
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow4" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="4" dy="4" stdDeviation="5" flood-opacity="0.4"/>
    </filter>
    
    <pattern id="atomic-3d-pattern" x="0" y="0" width="300" height="300" patternUnits="userSpaceOnUse">
      <!-- 3D Atom with Electron Orbits -->
      <g transform="translate(80, 80)" filter="url(#shadow4)">
        <!-- Nucleus -->
        <circle cx="0" cy="0" r="12" fill="currentColor" opacity="0.9" filter="url(#glow4)"/>
        <circle cx="0" cy="0" r="6" fill="currentColor" opacity="0.6"/>
        
        <!-- Electron orbit 1 - 3D ellipse -->
        <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="url(#atom-grad)" stroke-width="2.5" opacity="0.6" transform="rotate(0)"/>
        <circle cx="50" cy="0" r="5" fill="currentColor" opacity="0.8" filter="url(#glow4)"/>
        
        <!-- Electron orbit 2 - 3D ellipse -->
        <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="url(#atom-grad)" stroke-width="2.5" opacity="0.6" transform="rotate(60)"/>
        <circle cx="-25" cy="43" r="5" fill="currentColor" opacity="0.8" filter="url(#glow4)"/>
        
        <!-- Electron orbit 3 - 3D ellipse -->
        <ellipse cx="0" cy="0" rx="50" ry="20" fill="none" stroke="url(#atom-grad)" stroke-width="2.5" opacity="0.6" transform="rotate(120)"/>
        <circle cx="-25" cy="-43" r="5" fill="currentColor" opacity="0.8" filter="url(#glow4)"/>
      </g>
      
      <!-- Second 3D Atom -->
      <g transform="translate(220, 70)" filter="url(#shadow4)">
        <!-- Nucleus -->
        <circle cx="0" cy="0" r="10" fill="currentColor" opacity="0.8" filter="url(#glow4)"/>
        <circle cx="0" cy="0" r="5" fill="currentColor" opacity="0.5"/>
        
        <!-- Electron orbits -->
        <ellipse cx="0" cy="0" rx="40" ry="16" fill="none" stroke="url(#atom-grad)" stroke-width="2" opacity="0.5" transform="rotate(30)"/>
        <circle cx="35" cy="20" r="4" fill="currentColor" opacity="0.7" filter="url(#glow4)"/>
        
        <ellipse cx="0" cy="0" rx="40" ry="16" fill="none" stroke="url(#atom-grad)" stroke-width="2" opacity="0.5" transform="rotate(90)"/>
        <circle cx="0" cy="40" r="4" fill="currentColor" opacity="0.7" filter="url(#glow4)"/>
        
        <ellipse cx="0" cy="0" rx="40" ry="16" fill="none" stroke="url(#atom-grad)" stroke-width="2" opacity="0.5" transform="rotate(150)"/>
        <circle cx="-35" cy="20" r="4" fill="currentColor" opacity="0.7" filter="url(#glow4)"/>
      </g>
      
      <!-- Chemical Bond Between Atoms - 3D double line -->
      <path d="M 80 80 L 220 70" fill="none" stroke="currentColor" stroke-width="3" opacity="0.5" filter="url(#shadow4)"/>
      <path d="M 83 83 L 223 73" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4"/>
      
      <!-- 3D Benzene Ring -->
      <g transform="translate(150, 180)" filter="url(#shadow4)">
        <polygon points="0,-35 30,-17 30,17 0,35 -30,17 -30,-17" 
                 fill="none" stroke="url(#atom-grad)" stroke-width="3"/>
        <!-- Inner double bonds -->
        <path d="M -20 -25 L -12 -30" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.5"/>
        <path d="M 20 -25 L 12 -30" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.5"/>
        <path d="M 0 28 L 0 18" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.5"/>
        
        <!-- Atom nodes -->
        <circle cx="0" cy="-35" r="6" fill="currentColor" opacity="0.8" filter="url(#glow4)"/>
        <circle cx="30" cy="-17" r="6" fill="currentColor" opacity="0.8" filter="url(#glow4)"/>
        <circle cx="30" cy="17" r="6" fill="currentColor" opacity="0.8" filter="url(#glow4)"/>
        <circle cx="0" cy="35" r="6" fill="currentColor" opacity="0.8" filter="url(#glow4)"/>
        <circle cx="-30" cy="17" r="6" fill="currentColor" opacity="0.8" filter="url(#glow4)"/>
        <circle cx="-30" cy="-17" r="6" fill="currentColor" opacity="0.8" filter="url(#glow4)"/>
      </g>
      
      <!-- 3D Protein Chain -->
      <path d="M 30 240 Q 60 225, 90 240 Q 120 255, 150 240 Q 180 225, 210 240 Q 240 255, 270 240" 
            fill="none" stroke="url(#atom-grad)" stroke-width="3" filter="url(#shadow4)"/>
      <circle cx="60" cy="232" r="6" fill="currentColor" opacity="0.7" filter="url(#glow4)"/>
      <circle cx="120" cy="248" r="6" fill="currentColor" opacity="0.7" filter="url(#glow4)"/>
      <circle cx="180" cy="232" r="6" fill="currentColor" opacity="0.7" filter="url(#glow4)"/>
      <circle cx="240" cy="248" r="6" fill="currentColor" opacity="0.7" filter="url(#glow4)"/>
      
      <!-- Side chains -->
      <path d="M 90 240 L 90 265" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5" filter="url(#shadow4)"/>
      <circle cx="90" cy="265" r="5" fill="currentColor" opacity="0.6" filter="url(#glow4)"/>
      
      <path d="M 150 240 L 150 270" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5" filter="url(#shadow4)"/>
      <circle cx="150" cy="270" r="5" fill="currentColor" opacity="0.6" filter="url(#glow4)"/>
      
      <path d="M 210 240 L 210 265" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5" filter="url(#shadow4)"/>
      <circle cx="210" cy="265" r="5" fill="currentColor" opacity="0.6" filter="url(#glow4)"/>
      
      <!-- Small floating molecules -->
      <g transform="translate(40, 130)" filter="url(#glow4)">
        <circle cx="0" cy="0" r="7" fill="currentColor" opacity="0.6"/>
        <circle cx="30" cy="-15" r="5" fill="currentColor" opacity="0.5"/>
        <path d="M 0 0 L 30 -15" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
      </g>
      
      <g transform="translate(250, 130)" filter="url(#glow4)">
        <circle cx="0" cy="0" r="7" fill="currentColor" opacity="0.6"/>
        <circle cx="-30" cy="-15" r="5" fill="currentColor" opacity="0.5"/>
        <path d="M 0 0 L -30 -15" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
      </g>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#atomic-3d-pattern)"/>
</svg>
