<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <pattern id="dna-pattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <!-- DNA Double Helix Structure -->
      <!-- Strand 1 -->
      <path d="M 20 0 Q 60 50, 20 100 Q -20 150, 20 200" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
      <!-- Strand 2 -->
      <path d="M 100 0 Q 60 50, 100 100 Q 140 150, 100 200" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
      
      <!-- DNA Rungs (base pairs) -->
      <line x1="25" y1="25" x2="95" y2="25" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <line x1="30" y1="50" x2="90" y2="50" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <line x1="25" y1="75" x2="95" y2="75" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <line x1="20" y1="100" x2="100" y2="100" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <line x1="25" y1="125" x2="95" y2="125" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <line x1="30" y1="150" x2="90" y2="150" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <line x1="25" y1="175" x2="95" y2="175" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      
      <!-- Nucleotide nodes -->
      <circle cx="25" cy="25" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="95" cy="25" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="30" cy="50" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="90" cy="50" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="25" cy="75" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="95" cy="75" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="20" cy="100" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="100" cy="100" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="25" cy="125" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="95" cy="125" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="30" cy="150" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="90" cy="150" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="25" cy="175" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="95" cy="175" r="4" fill="currentColor" opacity="0.7"/>
      
      <!-- Chemical bond structures -->
      <path d="M 140 20 L 160 40 L 180 30 L 190 50" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <circle cx="140" cy="20" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="160" cy="40" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="180" cy="30" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="190" cy="50" r="3" fill="currentColor" opacity="0.6"/>
      
      <!-- Hexagonal benzene ring -->
      <polygon points="150,120 165,110 180,120 180,140 165,150 150,140" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <circle cx="150" cy="120" r="2.5" fill="currentColor" opacity="0.6"/>
      <circle cx="165" cy="110" r="2.5" fill="currentColor" opacity="0.6"/>
      <circle cx="180" cy="120" r="2.5" fill="currentColor" opacity="0.6"/>
      <circle cx="180" cy="140" r="2.5" fill="currentColor" opacity="0.6"/>
      <circle cx="165" cy="150" r="2.5" fill="currentColor" opacity="0.6"/>
      <circle cx="150" cy="140" r="2.5" fill="currentColor" opacity="0.6"/>
      
      <!-- Pill capsule icon -->
      <g transform="translate(140, 170) rotate(-30)" opacity="0.5">
        <rect x="0" y="0" width="12" height="24" rx="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <line x1="0" y1="12" x2="12" y2="12" stroke="currentColor" stroke-width="1.5"/>
      </g>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#dna-pattern)"/>
</svg>
