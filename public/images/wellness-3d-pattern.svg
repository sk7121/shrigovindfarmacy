<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <linearGradient id="well-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:currentColor;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:currentColor;stop-opacity:0.3"/>
    </linearGradient>
    
    <filter id="glow5" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.35"/>
    </filter>
    
    <pattern id="wellness-3d-pattern" x="0" y="0" width="270" height="270" patternUnits="userSpaceOnUse">
      <!-- 3D Ayurvedic Leaf -->
      <g transform="translate(50, 50)" filter="url(#shadow5)">
        <path d="M 0 0 Q 20 -30, 40 0 Q 20 15, 0 0" fill="none" stroke="url(#well-grad)" stroke-width="3"/>
        <path d="M 0 0 L 40 0" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
        <path d="M 10 -8 L 10 7" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        <path d="M 20 -12 L 20 10" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        <path d="M 30 -8 L 30 7" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        <circle cx="20" cy="0" r="4" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
      </g>
      
      <!-- 3D Mortar and Pestle -->
      <g transform="translate(160, 40)" filter="url(#shadow5)">
        <path d="M 12 25 Q 12 45, 30 45 Q 48 45, 48 25" fill="none" stroke="url(#well-grad)" stroke-width="3"/>
        <line x1="5" y1="25" x2="55" y2="25" stroke="currentColor" stroke-width="3" opacity="0.7"/>
        <line x1="38" y1="5" x2="25" y2="32" stroke="url(#well-grad)" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="38" cy="5" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
      </g>
      
      <!-- 3D Herbal Drops -->
      <g transform="translate(90, 110)" filter="url(#shadow5)">
        <path d="M 12 0 Q 18 18, 12 30 Q 6 18, 12 0" fill="none" stroke="url(#well-grad)" stroke-width="2.5"/>
        <circle cx="12" cy="30" r="4" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
      </g>
      
      <g transform="translate(115, 118)" filter="url(#shadow5)">
        <path d="M 10 0 Q 15 15, 10 24 Q 5 15, 10 0" fill="none" stroke="url(#well-grad)" stroke-width="2"/>
        <circle cx="10" cy="24" r="3" fill="currentColor" opacity="0.6" filter="url(#glow5)"/>
      </g>
      
      <!-- 3D DNA Helix -->
      <g transform="translate(40, 140)" filter="url(#shadow5)">
        <path d="M 12 0 Q 30 20, 12 40 Q -6 60, 12 80" fill="none" stroke="url(#well-grad)" stroke-width="3"/>
        <path d="M 48 0 Q 30 20, 48 40 Q 66 60, 48 80" fill="none" stroke="url(#well-grad)" stroke-width="3"/>
        <line x1="15" y1="15" x2="45" y2="15" stroke="currentColor" stroke-width="2" opacity="0.5"/>
        <line x1="12" y1="40" x2="48" y2="40" stroke="currentColor" stroke-width="2" opacity="0.5"/>
        <line x1="15" y1="65" x2="45" y2="65" stroke="currentColor" stroke-width="2" opacity="0.5"/>
        <circle cx="15" cy="15" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
        <circle cx="45" cy="15" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
        <circle cx="12" cy="40" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
        <circle cx="48" cy="40" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
        <circle cx="15" cy="65" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
        <circle cx="45" cy="65" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
      </g>
      
      <!-- 3D Lotus Flower (Ayurvedic symbol) -->
      <g transform="translate(180, 170)" filter="url(#shadow5)">
        <ellipse cx="0" cy="-15" rx="8" ry="16" fill="none" stroke="url(#well-grad)" stroke-width="2.5"/>
        <ellipse cx="-13" cy="-8" rx="8" ry="16" fill="none" stroke="url(#well-grad)" stroke-width="2.5" transform="rotate(-30 -13 -8)"/>
        <ellipse cx="13" cy="-8" rx="8" ry="16" fill="none" stroke="url(#well-grad)" stroke-width="2.5" transform="rotate(30 13 -8)"/>
        <ellipse cx="-16" cy="5" rx="8" ry="16" fill="none" stroke="url(#well-grad)" stroke-width="2.5" transform="rotate(-60 -16 5)"/>
        <ellipse cx="16" cy="5" rx="8" ry="16" fill="none" stroke="url(#well-grad)" stroke-width="2.5" transform="rotate(60 16 5)"/>
        <circle cx="0" cy="0" r="6" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
      </g>
      
      <!-- 3D Wellness Nodes -->
      <circle cx="50" cy="240" r="7" fill="currentColor" opacity="0.6" filter="url(#glow5)"/>
      <circle cx="85" cy="235" r="7" fill="currentColor" opacity="0.6" filter="url(#glow5)"/>
      <circle cx="120" cy="240" r="7" fill="currentColor" opacity="0.6" filter="url(#glow5)"/>
      <circle cx="155" cy="235" r="7" fill="currentColor" opacity="0.6" filter="url(#glow5)"/>
      <circle cx="190" cy="240" r="7" fill="currentColor" opacity="0.6" filter="url(#glow5)"/>
      <circle cx="225" cy="235" r="7" fill="currentColor" opacity="0.6" filter="url(#glow5)"/>
      
      <!-- Connection lines -->
      <path d="M 50 240 L 85 235 L 120 240 L 155 235 L 190 240 L 225 235" 
            fill="none" stroke="currentColor" stroke-width="2" opacity="0.5" filter="url(#shadow5)"/>
      
      <!-- 3D Herbal Molecule -->
      <g transform="translate(130, 200)" filter="url(#shadow5)">
        <path d="M 0 0 L 25 -15 L 50 0 L 50 25 L 25 40 L 0 25 Z" 
              fill="none" stroke="url(#well-grad)" stroke-width="2.5"/>
        <circle cx="0" cy="0" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
        <circle cx="25" cy="-15" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
        <circle cx="50" cy="0" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
        <circle cx="50" cy="25" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
        <circle cx="25" cy="40" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
        <circle cx="0" cy="25" r="5" fill="currentColor" opacity="0.7" filter="url(#glow5)"/>
      </g>
      
      <!-- Small decorative elements -->
      <g transform="translate(20, 110)" filter="url(#glow5)">
        <path d="M 0 10 L 14 10 M 7 3 L 7 17" stroke="currentColor" stroke-width="2.5" opacity="0.5"/>
      </g>
      <g transform="translate(230, 90)" filter="url(#glow5)">
        <path d="M 0 8 L 12 8 M 6 2 L 6 14" stroke="currentColor" stroke-width="2" opacity="0.4"/>
      </g>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#wellness-3d-pattern)"/>
</svg>
