<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <pattern id="modern-wellness" x="0" y="0" width="90" height="90" patternUnits="userSpaceOnUse">
      <!-- Modern leaf - minimalist -->
      <path d="M 15 15 Q 25 5, 35 15 Q 25 25, 15 15" 
            fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
      <line x1="15" y1="15" x2="35" y2="15" stroke="currentColor" stroke-width="1" opacity="0.25"/>
      
      <!-- Modern mortar and pestle -->
      <path d="M 55 10 Q 55 20, 65 20 Q 75 20, 75 10" 
            fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      <line x1="65" y1="5" x2="65" y2="15" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      
      <!-- Abstract DNA - minimalist -->
      <path d="M 10 45 C 18 50, 18 50, 10 55 C 2 60, 2 60, 10 65" 
            fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      <path d="M 25 45 C 17 50, 17 50, 25 55 C 33 60, 33 60, 25 65" 
            fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      <line x1="12" y1="50" x2="23" y2="50" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      <line x1="10" y1="55" x2="25" y2="55" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      <line x1="12" y1="60" x2="23" y2="60" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      
      <!-- Modern lotus - minimalist -->
      <ellipse cx="60" cy="55" rx="6" ry="10" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      <ellipse cx="52" cy="55" rx="6" ry="10" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3" transform="rotate(-25 52 55)"/>
      <ellipse cx="68" cy="55" rx="6" ry="10" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3" transform="rotate(25 68 55)"/>
      
      <!-- Wellness dots -->
      <circle cx="10" cy="80" r="2" fill="currentColor" opacity="0.35"/>
      <circle cx="20" cy="80" r="2" fill="currentColor" opacity="0.35"/>
      <circle cx="30" cy="80" r="2" fill="currentColor" opacity="0.35"/>
      <circle cx="40" cy="80" r="2" fill="currentColor" opacity="0.35"/>
      <circle cx="50" cy="80" r="2" fill="currentColor" opacity="0.35"/>
      <circle cx="60" cy="80" r="2" fill="currentColor" opacity="0.35"/>
      <circle cx="70" cy="80" r="2" fill="currentColor" opacity="0.35"/>
      <circle cx="80" cy="80" r="2" fill="currentColor" opacity="0.35"/>
      
      <!-- Subtle plus -->
      <path d="M 45 40 L 51 40 M 48 37 L 48 43" stroke="currentColor" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#modern-wellness)"/>
</svg>
