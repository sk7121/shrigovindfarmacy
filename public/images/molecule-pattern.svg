<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <pattern id="molecule-pattern" x="0" y="0" width="250" height="250" patternUnits="userSpaceOnUse">
      <!-- Complex Molecular Structure -->
      <!-- Main carbon chain -->
      <path d="M 30 40 L 70 20 L 110 40 L 150 20 L 190 40 L 230 20" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
      
      <!-- Branch chains -->
      <path d="M 70 20 L 70 -10" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <path d="M 110 40 L 110 80" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <path d="M 150 20 L 150 -10" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <path d="M 190 40 L 190 80" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      
      <!-- Double bonds -->
      <path d="M 35 45 L 75 25" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <path d="M 115 45 L 155 25" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      
      <!-- Atom nodes -->
      <circle cx="30" cy="40" r="6" fill="currentColor" opacity="0.7"/>
      <circle cx="70" cy="20" r="6" fill="currentColor" opacity="0.7"/>
      <circle cx="110" cy="40" r="6" fill="currentColor" opacity="0.7"/>
      <circle cx="150" cy="20" r="6" fill="currentColor" opacity="0.7"/>
      <circle cx="190" cy="40" r="6" fill="currentColor" opacity="0.7"/>
      <circle cx="230" cy="20" r="6" fill="currentColor" opacity="0.7"/>
      
      <!-- Branch nodes -->
      <circle cx="70" cy="-10" r="4" fill="currentColor" opacity="0.6"/>
      <circle cx="110" cy="80" r="4" fill="currentColor" opacity="0.6"/>
      <circle cx="150" cy="-10" r="4" fill="currentColor" opacity="0.6"/>
      <circle cx="190" cy="80" r="4" fill="currentColor" opacity="0.6"/>
      
      <!-- Benzene ring -->
      <polygon points="50,130 70,118 90,130 90,154 70,166 50,154" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
      <circle cx="50" cy="130" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="70" cy="118" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="90" cy="130" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="90" cy="154" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="70" cy="166" r="4" fill="currentColor" opacity="0.7"/>
      <circle cx="50" cy="154" r="4" fill="currentColor" opacity="0.7"/>
      
      <!-- Inner benzene bonds -->
      <path d="M 55 133 L 67 126" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <path d="M 85 133 L 85 151" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <path d="M 55 151 L 67 158" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      
      <!-- Amino acid structure -->
      <path d="M 140 120 L 170 110 L 200 120 L 220 100" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
      <path d="M 170 110 L 170 140 L 150 160" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <path d="M 170 140 L 190 160" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      
      <circle cx="140" cy="120" r="5" fill="currentColor" opacity="0.7"/>
      <circle cx="170" cy="110" r="5" fill="currentColor" opacity="0.7"/>
      <circle cx="200" cy="120" r="5" fill="currentColor" opacity="0.7"/>
      <circle cx="220" cy="100" r="5" fill="currentColor" opacity="0.7"/>
      <circle cx="170" cy="140" r="5" fill="currentColor" opacity="0.7"/>
      <circle cx="150" cy="160" r="4" fill="currentColor" opacity="0.6"/>
      <circle cx="190" cy="160" r="4" fill="currentColor" opacity="0.6"/>
      
      <!-- OH and NH2 labels -->
      <text x="135" y="115" font-size="10" fill="currentColor" opacity="0.6" font-family="Arial">OH</text>
      <text x="215" y="95" font-size="10" fill="currentColor" opacity="0.6" font-family="Arial">NH₂</text>
      
      <!-- Water molecule H2O -->
      <path d="M 40 200 L 55 215 L 70 200" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <circle cx="40" cy="200" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="55" cy="215" r="5" fill="currentColor" opacity="0.7"/>
      <circle cx="70" cy="200" r="3" fill="currentColor" opacity="0.6"/>
      <text x="35" y="195" font-size="8" fill="currentColor" opacity="0.5" font-family="Arial">H</text>
      <text x="50" y="210" font-size="8" fill="currentColor" opacity="0.5" font-family="Arial">O</text>
      <text x="65" y="195" font-size="8" fill="currentColor" opacity="0.5" font-family="Arial">H</text>
      
      <!-- Glucose ring -->
      <polygon points="140,200 160,190 180,200 180,220 160,230 140,220" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <circle cx="140" cy="200" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="160" cy="190" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="180" cy="200" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="180" cy="220" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="160" cy="230" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="140" cy="220" r="3" fill="currentColor" opacity="0.6"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#molecule-pattern)"/>
</svg>
