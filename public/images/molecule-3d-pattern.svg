<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <!-- 3D Gradient -->
    <linearGradient id="mol-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:currentColor;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:currentColor;stop-opacity:0.3"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow filter -->
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.35"/>
    </filter>
    
    <pattern id="molecule-3d-pattern" x="0" y="0" width="280" height="280" patternUnits="userSpaceOnUse">
      <!-- Complex 3D Molecular Structure -->
      <!-- Main carbon backbone -->
      <path d="M 30 50 L 70 30 L 110 50 L 150 30 L 190 50 L 230 30" 
            fill="none" stroke="url(#mol-grad)" stroke-width="3" filter="url(#shadow2)"/>
      
      <!-- Branch chains -->
      <path d="M 70 30 L 70 -5" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow2)"/>
      <path d="M 110 50 L 110 90" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow2)"/>
      <path d="M 150 30 L 150 -5" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow2)"/>
      <path d="M 190 50 L 190 90" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.6" filter="url(#shadow2)"/>
      
      <!-- Double bonds (parallel lines) -->
      <path d="M 35 55 L 75 35" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
      <path d="M 115 55 L 155 35" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
      
      <!-- 3D Atom spheres -->
      <circle cx="30" cy="50" r="8" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
      <circle cx="70" cy="30" r="8" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
      <circle cx="110" cy="50" r="8" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
      <circle cx="150" cy="30" r="8" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
      <circle cx="190" cy="50" r="8" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
      <circle cx="230" cy="30" r="8" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
      
      <!-- Branch atoms -->
      <circle cx="70" cy="-5" r="6" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
      <circle cx="110" cy="90" r="6" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
      <circle cx="150" cy="-5" r="6" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
      <circle cx="190" cy="90" r="6" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
      
      <!-- 3D Benzene Ring -->
      <g transform="translate(60, 140)" filter="url(#shadow2)">
        <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" 
                 fill="none" stroke="url(#mol-grad)" stroke-width="3"/>
        <!-- Inner double bonds -->
        <path d="M -18 -20 L -10 -25" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
        <path d="M 18 -20 L 10 -25" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
        <path d="M 0 25 L 0 15" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
        
        <!-- Atom nodes -->
        <circle cx="0" cy="-30" r="5" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="26" cy="-15" r="5" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="26" cy="15" r="5" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="0" cy="30" r="5" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="-26" cy="15" r="5" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="-26" cy="-15" r="5" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
      </g>
      
      <!-- Amino Acid 3D Structure -->
      <g transform="translate(160, 130)" filter="url(#shadow2)">
        <path d="M 0 0 L 30 -15 L 60 0 L 80 -20" fill="none" stroke="currentColor" stroke-width="3" opacity="0.7"/>
        <path d="M 30 -15 L 30 25 L 10 45" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.6"/>
        <path d="M 30 25 L 50 45" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.6"/>
        
        <circle cx="0" cy="0" r="7" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="30" cy="-15" r="7" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="60" cy="0" r="7" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="80" cy="-20" r="7" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="30" cy="25" r="7" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="10" cy="45" r="5" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
        <circle cx="50" cy="45" r="5" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
        
        <!-- Chemical labels -->
        <text x="-10" y="-8" font-size="11" fill="currentColor" opacity="0.7" font-family="Arial" font-weight="bold">OH</text>
        <text x="75" y="-28" font-size="11" fill="currentColor" opacity="0.7" font-family="Arial" font-weight="bold">NH₂</text>
      </g>
      
      <!-- Water Molecule H2O 3D -->
      <g transform="translate(50, 230)" filter="url(#shadow2)">
        <path d="M 0 0 L 20 20 L 40 0" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.6"/>
        <circle cx="0" cy="0" r="5" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
        <circle cx="20" cy="20" r="8" fill="currentColor" opacity="0.8" filter="url(#glow2)"/>
        <circle cx="40" cy="0" r="5" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
        <text x="-8" y="-8" font-size="10" fill="currentColor" opacity="0.6" font-family="Arial">H</text>
        <text x="12" y="15" font-size="10" fill="currentColor" opacity="0.6" font-family="Arial">O</text>
        <text x="32" y="-8" font-size="10" fill="currentColor" opacity="0.6" font-family="Arial">H</text>
      </g>
      
      <!-- Glucose Ring 3D -->
      <g transform="translate(160, 230)" filter="url(#shadow2)">
        <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" 
                 fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.6"/>
        <circle cx="0" cy="-25" r="4" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
        <circle cx="22" cy="-12" r="4" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
        <circle cx="22" cy="12" r="4" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
        <circle cx="0" cy="25" r="4" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
        <circle cx="-22" cy="12" r="4" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
        <circle cx="-22" cy="-12" r="4" fill="currentColor" opacity="0.7" filter="url(#glow2)"/>
      </g>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#molecule-3d-pattern)"/>
</svg>
