<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <pattern id="atomic-pattern" x="0" y="0" width="240" height="240" patternUnits="userSpaceOnUse">
      <!-- Atom with Electron Orbits -->
      <g transform="translate(60, 60)">
        <!-- Nucleus -->
        <circle cx="0" cy="0" r="8" fill="currentColor" opacity="0.8"/>
        
        <!-- Electron orbit 1 -->
        <ellipse cx="0" cy="0" rx="35" ry="15" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5" transform="rotate(0)"/>
        <circle cx="35" cy="0" r="3" fill="currentColor" opacity="0.7"/>
        
        <!-- Electron orbit 2 -->
        <ellipse cx="0" cy="0" rx="35" ry="15" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5" transform="rotate(60)"/>
        <circle cx="-17" cy="30" r="3" fill="currentColor" opacity="0.7"/>
        
        <!-- Electron orbit 3 -->
        <ellipse cx="0" cy="0" rx="35" ry="15" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5" transform="rotate(120)"/>
        <circle cx="-17" cy="-30" r="3" fill="currentColor" opacity="0.7"/>
      </g>
      
      <!-- Second Atom -->
      <g transform="translate(180, 50)">
        <!-- Nucleus -->
        <circle cx="0" cy="0" r="6" fill="currentColor" opacity="0.7"/>
        
        <!-- Electron orbit 1 -->
        <ellipse cx="0" cy="0" rx="28" ry="12" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4" transform="rotate(30)"/>
        <circle cx="24" cy="14" r="2.5" fill="currentColor" opacity="0.6"/>
        
        <!-- Electron orbit 2 -->
        <ellipse cx="0" cy="0" rx="28" ry="12" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4" transform="rotate(90)"/>
        <circle cx="0" cy="28" r="2.5" fill="currentColor" opacity="0.6"/>
        
        <!-- Electron orbit 3 -->
        <ellipse cx="0" cy="0" rx="28" ry="12" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4" transform="rotate(150)"/>
        <circle cx="-24" cy="14" r="2.5" fill="currentColor" opacity="0.6"/>
      </g>
      
      <!-- Chemical Bond Between Atoms -->
      <path d="M 60 60 L 180 50" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4"/>
      <path d="M 63 63 L 183 53" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      
      <!-- Benzene Ring -->
      <g transform="translate(120, 140)">
        <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
        <circle cx="0" cy="-25" r="4" fill="currentColor" opacity="0.7"/>
        <circle cx="22" cy="-12" r="4" fill="currentColor" opacity="0.7"/>
        <circle cx="22" cy="12" r="4" fill="currentColor" opacity="0.7"/>
        <circle cx="0" cy="25" r="4" fill="currentColor" opacity="0.7"/>
        <circle cx="-22" cy="12" r="4" fill="currentColor" opacity="0.7"/>
        <circle cx="-22" cy="-12" r="4" fill="currentColor" opacity="0.7"/>
        
        <!-- Inner double bonds -->
        <path d="M -15 -18 L -8 -22" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
        <path d="M 15 -18 L 8 -22" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
        <path d="M 0 20 L 0 12" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      </g>
      
      <!-- Protein Chain -->
      <path d="M 20 180 Q 40 170, 60 180 Q 80 190, 100 180 Q 120 170, 140 180 Q 160 190, 180 180 Q 200 170, 220 180" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
      <circle cx="40" cy="175" r="4" fill="currentColor" opacity="0.6"/>
      <circle cx="80" cy="185" r="4" fill="currentColor" opacity="0.6"/>
      <circle cx="120" cy="175" r="4" fill="currentColor" opacity="0.6"/>
      <circle cx="160" cy="185" r="4" fill="currentColor" opacity="0.6"/>
      <circle cx="200" cy="175" r="4" fill="currentColor" opacity="0.6"/>
      
      <!-- Side chains -->
      <path d="M 60 180 L 60 200" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <circle cx="60" cy="200" r="3" fill="currentColor" opacity="0.5"/>
      
      <path d="M 100 180 L 100 205" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <circle cx="100" cy="205" r="3" fill="currentColor" opacity="0.5"/>
      
      <path d="M 140 180 L 140 200" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <circle cx="140" cy="200" r="3" fill="currentColor" opacity="0.5"/>
      
      <!-- Small molecules -->
      <circle cx="30" cy="110" r="5" fill="currentColor" opacity="0.5"/>
      <circle cx="210" cy="110" r="5" fill="currentColor" opacity="0.5"/>
      <path d="M 30 110 L 60 95" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <path d="M 210 110 L 180 95" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#atomic-pattern)"/>
</svg>
