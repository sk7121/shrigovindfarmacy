<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <pattern id="pharmacy-pattern" x="0" y="0" width="220" height="220" patternUnits="userSpaceOnUse">
      <!-- Medical Cross -->
      <g transform="translate(30, 30)" opacity="0.6">
        <rect x="15" y="0" width="20" height="50" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <rect x="0" y="15" width="50" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
      </g>
      
      <!-- Pill Capsules -->
      <g transform="translate(100, 20) rotate(45)" opacity="0.5">
        <rect x="0" y="0" width="16" height="32" rx="8" fill="none" stroke="currentColor" stroke-width="2"/>
        <line x1="0" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="2"/>
      </g>
      
      <g transform="translate(160, 60) rotate(-30)" opacity="0.5">
        <rect x="0" y="0" width="14" height="28" rx="7" fill="none" stroke="currentColor" stroke-width="2"/>
        <line x1="0" y1="14" x2="14" y2="14" stroke="currentColor" stroke-width="2"/>
      </g>
      
      <!-- Heartbeat / ECG Line -->
      <path d="M 10 100 L 30 100 L 40 85 L 55 120 L 70 90 L 80 100 L 100 100" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
      <circle cx="55" cy="120" r="3" fill="currentColor" opacity="0.7"/>
      
      <!-- Stethoscope Circle -->
      <circle cx="170" cy="110" r="20" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
      <circle cx="170" cy="110" r="8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <path d="M 170 90 L 170 75" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
      
      <!-- DNA Helix Mini -->
      <path d="M 20 150 Q 35 165, 20 180 Q 5 195, 20 210" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <path d="M 50 150 Q 35 165, 50 180 Q 65 195, 50 210" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <line x1="23" y1="160" x2="47" y2="160" stroke="currentColor" stroke-width="1" opacity="0.4"/>
      <line x1="20" y1="180" x2="50" y2="180" stroke="currentColor" stroke-width="1" opacity="0.4"/>
      <line x1="23" y1="200" x2="47" y2="200" stroke="currentColor" stroke-width="1" opacity="0.4"/>
      
      <!-- Medicine Bottle -->
      <g transform="translate(100, 150)" opacity="0.5">
        <rect x="5" y="10" width="20" height="35" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
        <rect x="10" y="0" width="10" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10" y1="20" x2="20" y2="20" stroke="currentColor" stroke-width="1" opacity="0.6"/>
        <line x1="10" y1="25" x2="20" y2="25" stroke="currentColor" stroke-width="1" opacity="0.6"/>
        <line x1="10" y1="30" x2="18" y2="30" stroke="currentColor" stroke-width="1" opacity="0.6"/>
      </g>
      
      <!-- Molecular Structure -->
      <path d="M 160 160 L 180 150 L 200 160 L 200 180 L 180 190 L 160 180 Z" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <circle cx="160" cy="160" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="180" cy="150" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="200" cy="160" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="200" cy="180" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="180" cy="190" r="3" fill="currentColor" opacity="0.6"/>
      <circle cx="160" cy="180" r="3" fill="currentColor" opacity="0.6"/>
      
      <!-- Plus symbols scattered -->
      <path d="M 80 140 L 90 140 M 85 135 L 85 145" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <path d="M 130 100 L 140 100 M 135 95 L 135 105" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#pharmacy-pattern)"/>
</svg>
