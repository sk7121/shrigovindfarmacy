<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <pattern id="modern-dna" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <!-- Modern minimalist DNA helix -->
      <path d="M 20 0 C 40 30, 40 30, 20 60 C 0 90, 0 90, 20 120" 
            fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      <path d="M 60 0 C 40 30, 40 30, 60 60 C 80 90, 80 90, 60 120" 
            fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
      
      <!-- Connection dots -->
      <circle cx="20" cy="30" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="60" cy="30" r="2" fill="currentColor" opacity="0.5"/>
      <line x1="20" y1="30" x2="60" y2="30" stroke="currentColor" stroke-width="1" opacity="0.3"/>
      
      <circle cx="20" cy="60" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="60" cy="60" r="2" fill="currentColor" opacity="0.5"/>
      <line x1="20" y1="60" x2="60" y2="60" stroke="currentColor" stroke-width="1" opacity="0.3"/>
      
      <circle cx="20" cy="90" r="2" fill="currentColor" opacity="0.5"/>
      <circle cx="60" cy="90" r="2" fill="currentColor" opacity="0.5"/>
      <line x1="20" y1="90" x2="60" y2="90" stroke="currentColor" stroke-width="1" opacity="0.3"/>
      
      <!-- Abstract dots grid -->
      <circle cx="90" cy="20" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="100" cy="20" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="110" cy="20" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="90" cy="30" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="100" cy="30" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="110" cy="30" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="90" cy="40" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="100" cy="40" r="1.5" fill="currentColor" opacity="0.3"/>
      <circle cx="110" cy="40" r="1.5" fill="currentColor" opacity="0.3"/>
      
      <!-- Minimalist pill shape -->
      <rect x="85" y="70" width="8" height="16" rx="4" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#modern-dna)"/>
</svg>
