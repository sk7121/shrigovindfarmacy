<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email - OTP Verification | Shri Govind Pharmacy</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #4ade80;
        --primary-light: #86efac;
        --primary-dark: #22c55e;
        --text-dark: #17252a;
        --text-muted: #6b7c85;
        --bg-light: #f8fafc;
        --card-bg: #ffffff;
        --border-color: #e2e8f0;
        --shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
        --radius: 14px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        max-width: 480px;
        width: 100%;
      }

      .card {
        background: var(--card-bg);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 40px 30px;
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo-icon {
        width: 70px;
        height: 70px;
        margin: 0 auto 15px;
        border-radius: 18px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
        box-shadow: 0 8px 20px rgba(74, 222, 128, 0.3);
      }

      .logo-title {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--primary-dark);
      }

      .logo-subtitle {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 5px;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 10px;
      }

      .header p {
        color: var(--text-muted);
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .email-display {
        background: #f0fdf4;
        border: 2px solid #dcfce7;
        border-radius: 10px;
        padding: 15px 20px;
        margin-bottom: 25px;
        text-align: center;
      }

      .email-display i {
        color: var(--primary-dark);
        margin-right: 8px;
      }

      .email-display strong {
        color: var(--primary-dark);
        word-break: break-all;
      }

      .form-group {
        margin-bottom: 25px;
      }

      .form-label {
        display: block;
        font-weight: 600;
        color: var(--text-dark);
        margin-bottom: 10px;
        font-size: 0.95rem;
      }

      .otp-inputs {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .otp-input {
        width: 50px;
        height: 60px;
        border: 2px solid var(--border-color);
        border-radius: 10px;
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-dark);
        transition: all 0.3s ease;
      }

      .otp-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.1);
      }

      .timer {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
        margin: 20px 0;
      }

      .timer-countdown {
        font-weight: 700;
        color: var(--primary-dark);
      }

      .resend {
        text-align: center;
        margin-top: 20px;
      }

      .resend-btn {
        background: none;
        border: none;
        color: var(--primary-dark);
        font-weight: 600;
        cursor: pointer;
        font-size: 0.95rem;
        transition: all 0.3s ease;
      }

      .resend-btn:hover {
        color: var(--primary);
        text-decoration: underline;
      }

      .resend-btn:disabled {
        color: var(--text-muted);
        cursor: not-allowed;
      }

      .btn {
        width: 100%;
        padding: 14px 24px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: var(--radius);
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(74, 222, 128, 0.3);
      }

      .btn:disabled {
        background: var(--text-muted);
        cursor: not-allowed;
        transform: none;
      }

      .message {
        padding: 12px 16px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        display: none;
      }

      .message.success {
        background: #f0fdf4;
        color: #15803d;
        border: 1px solid #dcfce7;
      }

      .message.error {
        background: #fef2f2;
        color: #dc2626;
        border: 1px solid #fee2e2;
      }

      .back-link {
        text-align: center;
        margin-top: 25px;
      }

      .back-link a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s ease;
      }

      .back-link a:hover {
        color: var(--primary-dark);
      }

      @media (max-width: 480px) {
        .otp-input {
          width: 40px;
          height: 50px;
          font-size: 1.2rem;
        }

        .card {
          padding: 30px 20px;
        }

        .header h1 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="logo">
          <div class="logo-icon">🌿</div>
          <div class="logo-title">Shri Govind Pharmacy</div>
          <div class="logo-subtitle">Your Health, Our Priority</div>
        </div>

        <div class="header">
          <h1>Verify Your Email</h1>
          <p>
            We've sent a 6-digit OTP code to your email. Enter it below to
            complete your registration.
          </p>
        </div>

        <div class="email-display">
          <i class="fas fa-envelope"></i>
          <strong id="userEmail">loading...</strong>
        </div>

        <div id="message" class="message"></div>

        <form id="otpForm">
          <div class="form-group">
            <label class="form-label">Enter OTP Code</label>
            <div class="otp-inputs">
              <input
                type="text"
                class="otp-input"
                maxlength="1"
                data-index="0"
                required
              />
              <input
                type="text"
                class="otp-input"
                maxlength="1"
                data-index="1"
                required
              />
              <input
                type="text"
                class="otp-input"
                maxlength="1"
                data-index="2"
                required
              />
              <input
                type="text"
                class="otp-input"
                maxlength="1"
                data-index="3"
                required
              />
              <input
                type="text"
                class="otp-input"
                maxlength="1"
                data-index="4"
                required
              />
              <input
                type="text"
                class="otp-input"
                maxlength="1"
                data-index="5"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn" id="verifyBtn">
            <i class="fas fa-check-circle"></i>
            Verify Email
          </button>
        </form>

        <div class="timer">
          <i class="fas fa-clock"></i>
          OTP expires in: <span class="timer-countdown" id="timer">10:00</span>
        </div>

        <div class="resend">
          <p style="color: var(--text-muted); margin-bottom: 10px">
            Didn't receive the code?
          </p>
          <button class="resend-btn" id="resendBtn">
            <i class="fas fa-redo"></i>
            Resend OTP
          </button>
        </div>

        <div class="back-link">
          <a href="/login">
            <i class="fas fa-arrow-left"></i>
            Back to Login
          </a>
        </div>
      </div>
    </div>

    <script>
      console.log("[Verify OTP Page] Page loaded");

      // Get email and redirect from URL or localStorage
      const urlParams = new URLSearchParams(window.location.search);
      const email =
        urlParams.get("email") || localStorage.getItem("pendingEmail");
      const redirect = urlParams.get("redirect");

      console.log(
        "[Verify OTP Page] Email from URL:",
        email,
        "Redirect:",
        redirect,
      );

      if (!email) {
        console.log("[Verify OTP Page] No email found, redirecting to login");
        window.location.href = "/login";
      } else {
        document.getElementById("userEmail").textContent = email;
        localStorage.setItem("pendingEmail", email);
      }

      // OTP input handling
      const otpInputs = document.querySelectorAll(".otp-input");

      otpInputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
          const value = e.target.value;

          // Only allow numbers
          if (!/^\d*$/.test(value)) {
            e.target.value = "";
            return;
          }

          // Move to next input
          if (value && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }
        });

        input.addEventListener("keydown", (e) => {
          // Move to previous input on backspace
          if (e.key === "Backspace" && !e.target.value && index > 0) {
            otpInputs[index - 1].focus();
          }
        });

        // Auto-paste handling
        input.addEventListener("paste", (e) => {
          e.preventDefault();
          const pasteData = e.clipboardData.getData("text").slice(0, 6);

          if (/^\d{6}$/.test(pasteData)) {
            pasteData.split("").forEach((char, i) => {
              if (otpInputs[i]) {
                otpInputs[i].value = char;
              }
            });
            otpInputs[5].focus();
          }
        });
      });

      // Timer
      let timeLeft = 600; // 10 minutes
      const timerElement = document.getElementById("timer");

      const timer = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerElement.textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;

        if (timeLeft <= 0) {
          clearInterval(timer);
          document.getElementById("resendBtn").disabled = false;
        }
        timeLeft--;
      }, 1000);

      // Form submission
      document
        .getElementById("otpForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const messageEl = document.getElementById("message");
          const verifyBtn = document.getElementById("verifyBtn");

          // Get OTP
          let otp = "";
          otpInputs.forEach((input) => (otp += input.value));

          if (otp.length !== 6) {
            showMessage("Please enter complete 6-digit OTP", "error");
            return;
          }

          verifyBtn.disabled = true;
          verifyBtn.innerHTML =
            '<i class="fas fa-spinner fa-spin"></i> Verifying...';

          try {
            const response = await fetch("/api/otp/verify", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include", // Include session cookie
              body: JSON.stringify({
                email: email,
                otp: otp,
                purpose: "email_verification",
                redirect: redirect,
              }),
            });

            const result = await response.json();

            if (result.success) {
              showMessage(
                "✅ Email verified successfully! Redirecting...",
                "success",
              );
              localStorage.removeItem("pendingEmail");

              // Redirect to the URL returned by server or default to home
              setTimeout(() => {
                window.location.href = result.redirect || "/home";
              }, 2000);
            } else {
              showMessage("❌ " + result.message, "error");
              verifyBtn.disabled = false;
              verifyBtn.innerHTML =
                '<i class="fas fa-check-circle"></i> Verify Email';
            }
          } catch (error) {
            showMessage("❌ Network error. Please try again.", "error");
            verifyBtn.disabled = false;
            verifyBtn.innerHTML =
              '<i class="fas fa-check-circle"></i> Verify Email';
          }
        });

      // Resend OTP
      document
        .getElementById("resendBtn")
        .addEventListener("click", async () => {
          const resendBtn = document.getElementById("resendBtn");
          const messageEl = document.getElementById("message");

          resendBtn.disabled = true;
          resendBtn.innerHTML =
            '<i class="fas fa-spinner fa-spin"></i> Sending...';

          try {
            const response = await fetch("/api/otp/resend", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include", // Include session cookie
              body: JSON.stringify({
                email: email,
                purpose: "email_verification",
              }),
            });

            const result = await response.json();

            if (result.success) {
              showMessage(
                "✅ OTP resent successfully! Check your email.",
                "success",
              );

              // Reset timer
              timeLeft = 600;
            } else {
              showMessage("❌ " + result.message, "error");
            }
          } catch (error) {
            showMessage("❌ Network error. Please try again.", "error");
          }

          resendBtn.disabled = false;
          resendBtn.innerHTML = '<i class="fas fa-redo"></i> Resend OTP';
        });

      function showMessage(text, type) {
        const messageEl = document.getElementById("message");
        messageEl.textContent = text;
        messageEl.className = `message ${type}`;
        messageEl.style.display = "block";

        if (type === "success") {
          setTimeout(() => {
            messageEl.style.display = "none";
          }, 5000);
        }
      }

      // Focus first input on load
      otpInputs[0].focus();
    </script>
  </body>
</html>
